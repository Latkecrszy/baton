# Release build check.
# Baton is not published to PyPI yet; this workflow intentionally builds the
# package on release/manual dispatch without uploading it.

name: Release Build Check

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify release tag matches package version
        run: |
          python -c "import os, pathlib, sys, tomllib; version = tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version']; tag = os.environ['GITHUB_REF_NAME']; expected = f'v{version}'; print(f'Checking release build for {expected}') if tag == expected else sys.exit(f'release tag {tag} does not match package version {expected}')"

      - run: pip install build
      - run: python -m build
